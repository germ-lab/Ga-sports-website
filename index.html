<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Georgia Sports Hub</title>
  <link rel="stylesheet" href="style.css?v=4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <button class="hamburger" id="menuToggle" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">
        <div class="site-title">Georgia Sports Hub</div>
      </div>
      <div class="header-actions">
        <span class="last-updated" id="lastUpdated"></span>
        <label class="theme-switch" title="Toggle light/dark mode">
          <input type="checkbox" id="themeToggle">
          <span class="theme-slider"></span>
        </label>
        <button class="btn-refresh" id="refreshBtn" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Slide-out Nav Drawer -->
  <div class="nav-overlay" id="navOverlay"></div>
  <nav class="nav-drawer" id="navDrawer">
    <div class="nav-drawer-header">
      <span class="nav-drawer-title">Teams</span>
      <button class="nav-drawer-close" id="menuClose" aria-label="Close menu">&times;</button>
    </div>
    <div class="nav-links" id="navTabs">
      <button class="nav-link active" data-team="all">All Teams</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container" id="mainContainer">
      <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <p>Loading Georgia sports data…</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>Data powered by ESPN &bull; Georgia Sports Hub &bull; <span id="footerYear"></span></p>
    </div>
  </footer>

  <!-- Matchup Preview Modal -->
  <div class="mu-overlay" id="matchupOverlay" onclick="closeMatchupModal()"></div>
  <div class="mu-modal" id="matchupModal">
    <div class="mu-modal-header">
      <span class="mu-modal-title">Matchup Preview</span>
      <button class="mu-close" onclick="closeMatchupModal()" aria-label="Close">&times;</button>
    </div>
    <div class="mu-modal-body" id="matchupModalBody">
      <div class="mu-loading">Loading…</div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
